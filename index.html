<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upscale — 4× AI Print Enhancer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap');

/* ── TOKENS ── */
:root {
  --bg:       #f7f6f3;
  --surface:  #ffffff;
  --border:   #e4e2dd;
  --ink:      #1a1916;
  --ink2:     #7a7872;
  --ink3:     #b5b2ac;
  --lime:     #b8f04a;
  --lime-dk:  #8ec827;
  --red:      #ff4f4f;
  --radius:   14px;
  --mono:     'DM Mono', ui-monospace, monospace;
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', ui-sans-serif, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem 4rem;
}

/* ── HEADER ── */
header {
  width: 100%; max-width: 560px;
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 2.5rem;
}
.logo {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem; font-weight: 300;
  letter-spacing: -0.03em; color: var(--ink);
}
.logo em { font-style: italic; color: var(--lime-dk); }
.version {
  font-family: var(--mono); font-size: 0.62rem;
  color: var(--ink3); letter-spacing: 0.06em;
}

/* ── CARD ── */
.card {
  width: 100%; max-width: 560px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 0 var(--border), 0 8px 32px rgba(0,0,0,0.04);
}

/* ── DROP ZONE ── */
.drop-zone {
  position: relative;
  padding: 3rem 2rem;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0.75rem;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.18s;
  min-height: 220px;
}
.drop-zone:hover  { background: #f2f1ee; }
.drop-zone.over   { background: #eefad6; border-color: var(--lime-dk); }
.drop-zone input  { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

.drop-icon {
  width: 52px; height: 52px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
}
.drop-zone:hover .drop-icon { transform: translateY(-2px); }
.drop-icon svg { width: 22px; height: 22px; stroke: var(--ink2); fill: none; stroke-width: 1.6; }

.drop-label {
  font-size: 0.9rem; font-weight: 500; color: var(--ink);
  text-align: center; line-height: 1.4;
}
.drop-sub {
  font-family: var(--mono); font-size: 0.65rem;
  color: var(--ink3); letter-spacing: 0.05em;
}

/* ── WARNING BANNER ── */
.warn-banner {
  display: none;
  margin: 0.75rem 1rem 0;
  padding: 0.6rem 0.85rem;
  background: #fff8ed; border: 1px solid #f0c070;
  border-radius: 8px;
  font-family: var(--mono); font-size: 0.68rem; color: #7a5000;
  line-height: 1.5;
}
.warn-banner.show { display: block; }
.warn-banner.err  { background: #fff0f0; border-color: var(--red); color: #7a0000; }

/* ── PREVIEW SECTION ── */
.preview-section {
  display: none;
  border-bottom: 1px solid var(--border);
}
.preview-section.show { display: block; }

.preview-tabs {
  display: flex; border-bottom: 1px solid var(--border);
}
.tab-btn {
  flex: 1; padding: 0.65rem;
  font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.06em;
  color: var(--ink3); background: transparent; border: none;
  cursor: pointer; transition: all 0.15s;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
.tab-btn:hover:not(.active):not(:disabled) { color: var(--ink2); }
.tab-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.preview-canvas {
  position: relative;
  background: repeating-conic-gradient(#ececea 0% 25%, #f7f6f3 0% 50%) 0 0 / 20px 20px;
  min-height: 260px; max-height: 420px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.preview-canvas img {
  max-width: 100%; max-height: 420px;
  object-fit: contain; display: block;
}
.panel-tag {
  position: absolute; top: 10px; left: 10px;
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.08em;
  background: rgba(255,255,255,0.85); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 7px; color: var(--ink2);
  backdrop-filter: blur(4px);
}

/* ── IMAGE META ── */
.img-meta {
  display: none;
  padding: 0.65rem 1rem;
  border-bottom: 1px solid var(--border);
}
.img-meta.show { display: flex; gap: 1.5rem; flex-wrap: wrap; }
.meta-item { display: flex; flex-direction: column; gap: 1px; }
.meta-label { font-family: var(--mono); font-size: 0.55rem; color: var(--ink3); letter-spacing: 0.1em; text-transform: uppercase; }
.meta-val   { font-family: var(--mono); font-size: 0.75rem; color: var(--ink); font-weight: 500; }

/* ── PROGRESS ── */
.progress-wrap {
  padding: 1rem;
  border-bottom: 1px solid var(--border);
  display: none;
}
.progress-wrap.show { display: block; }
.progress-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 0.5rem;
}
.progress-status { font-family: var(--mono); font-size: 0.68rem; color: var(--ink2); }
.progress-pct    { font-family: var(--mono); font-size: 0.68rem; color: var(--ink); font-weight: 500; }
.progress-track  {
  height: 6px; background: var(--bg);
  border-radius: 99px; overflow: hidden;
  border: 1px solid var(--border);
}
.progress-fill   {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--lime-dk), var(--lime));
  border-radius: 99px;
  transition: width 0.35s ease;
}

/* ── ACTIONS ── */
.actions {
  padding: 1rem;
  display: flex; gap: 0.6rem; align-items: center;
}

.btn {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600; font-size: 0.82rem;
  padding: 0.65rem 1.4rem; border-radius: 10px;
  border: 1px solid transparent;
  cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 0.4rem;
  white-space: nowrap;
}
.btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-primary {
  background: var(--ink); color: #fff;
  flex: 1; justify-content: center;
}
.btn-primary:hover:not(:disabled) { background: #2d2b27; }

.btn-lime {
  background: var(--lime); color: var(--ink);
  border-color: var(--lime-dk);
}
.btn-lime:hover:not(:disabled) { background: var(--lime-dk); color: #fff; border-color: var(--lime-dk); }

.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ink3); flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.busy { background: var(--lime-dk); animation: pulse 1s ease-in-out infinite; }
.status-dot.done { background: #22c55e; }
.status-dot.err  { background: var(--red); }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.8); }
}

/* ── FOOTER ── */
footer {
  margin-top: 2rem;
  font-family: var(--mono); font-size: 0.62rem; color: var(--ink3);
  text-align: center; line-height: 1.8;
}
footer a { color: var(--ink2); text-decoration: none; }
footer a:hover { color: var(--ink); }

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  body { padding: 1.25rem 0.75rem 3rem; }
  .drop-zone { padding: 2rem 1.25rem; }
  .actions { flex-wrap: wrap; }
  .btn-primary { flex: 1 1 100%; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Up<em>scale</em></div>
  <span class="version">4× · CPU · 300 DPI</span>
</header>

<div class="card">

  <!-- DROP ZONE -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" />
    <div class="drop-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="drop-label">Drop an image here<br>or click to browse</div>
    <div class="drop-sub">PNG · JPG · WEBP &nbsp;·&nbsp; max 1024 × 1024 px</div>
  </div>

  <!-- WARNING BANNER -->
  <div class="warn-banner" id="warnBanner"></div>

  <!-- IMAGE META -->
  <div class="img-meta" id="imgMeta">
    <div class="meta-item"><div class="meta-label">Input</div><div class="meta-val" id="metaDims">—</div></div>
    <div class="meta-item"><div class="meta-label">Output</div><div class="meta-val" id="metaOut">—</div></div>
    <div class="meta-item"><div class="meta-label">Size</div><div class="meta-val" id="metaSize">—</div></div>
    <div class="meta-item"><div class="meta-label">Export</div><div class="meta-val">PNG 300 DPI</div></div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-section" id="previewSection">
    <div class="preview-tabs">
      <button class="tab-btn active" id="tabBefore" onclick="showTab('before')">ORIGINAL</button>
      <button class="tab-btn" id="tabAfter" onclick="showTab('after')" disabled>AI OUTPUT</button>
    </div>
    <div class="preview-canvas">
      <img id="previewImg" src="" alt="Preview" />
      <div class="panel-tag" id="panelTag">ORIGINAL</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-top">
      <span class="progress-status" id="progressStatus">Initialising…</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <div class="status-dot" id="statusDot"></div>
    <button class="btn btn-primary" id="btnUpscale" disabled onclick="startUpscale()">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Start Upscale
    </button>
    <button class="btn btn-lime" id="btnDownload" disabled onclick="downloadResult()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Save
    </button>
  </div>

</div>

<footer>
  Runs entirely in your browser · No uploads · CPU inference<br>
  <a href="https://github.com/upscalerjs/upscaler" target="_blank" rel="noopener">UpscalerJS</a> ·
  ESRGAN-Thick 4× model ·
  <a href="https://www.tensorflow.org/js" target="_blank" rel="noopener">TensorFlow.js</a>
</footer>

<!--
  CRITICAL LOAD ORDER:
  1. TF Core + CPU backend only  (no WebGL = no GPU OOM crash)
  2. ESRGAN model
  3. Upscaler runtime
-->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@upscalerjs/real-esrgan@latest/dist/umd/4x.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/upscaler@latest/dist/browser/umd/upscaler.min.js"></script>

<script>
/* ═══════════════════════════════
   CONFIG
═══════════════════════════════ */
const MAX_W    = 1024;
const MAX_H    = 1024;
const DPI_PPM  = Math.round(300 * 1000 / 25.4); // 11811 px/m → 300 DPI

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
let currentFile   = null;
let origObjectURL = null;
let outputBlob    = null;
let upscalerInst  = null;

/* ═══════════════════════════════
   DOM REFS
═══════════════════════════════ */
const dropZone       = document.getElementById('dropZone');
const fileInput      = document.getElementById('fileInput');
const warnBanner     = document.getElementById('warnBanner');
const imgMeta        = document.getElementById('imgMeta');
const metaDims       = document.getElementById('metaDims');
const metaOut        = document.getElementById('metaOut');
const metaSize       = document.getElementById('metaSize');
const previewSection = document.getElementById('previewSection');
const previewImg     = document.getElementById('previewImg');
const panelTag       = document.getElementById('panelTag');
const tabBefore      = document.getElementById('tabBefore');
const tabAfter       = document.getElementById('tabAfter');
const progressWrap   = document.getElementById('progressWrap');
const progressFill   = document.getElementById('progressFill');
const progressStatus = document.getElementById('progressStatus');
const progressPct    = document.getElementById('progressPct');
const btnUpscale     = document.getElementById('btnUpscale');
const btnDownload    = document.getElementById('btnDownload');
const statusDot      = document.getElementById('statusDot');

/* ═══════════════════════════════
   DROP / FILE INPUT
═══════════════════════════════ */
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  const f = Array.from(e.dataTransfer.files).find(f => f.type.startsWith('image/'));
  if (f) loadFile(f);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
  fileInput.value = '';
});

/* ═══════════════════════════════
   LOAD FILE
═══════════════════════════════ */
function fmtBytes(b) {
  return b < 1048576 ? (b / 1024).toFixed(0) + ' KB' : (b / 1048576).toFixed(1) + ' MB';
}

function loadFile(file) {
  // Reset everything
  outputBlob = null;
  btnDownload.disabled = true;
  btnUpscale.disabled  = true;
  tabAfter.disabled    = true;
  tabAfter.classList.remove('active');
  tabBefore.classList.add('active');
  clearWarn();
  progressWrap.classList.remove('show');
  setDot('');

  currentFile = file;
  if (origObjectURL) URL.revokeObjectURL(origObjectURL);
  origObjectURL = URL.createObjectURL(file);

  const img = new Image();
  img.onload = () => {
    const w = img.naturalWidth, h = img.naturalHeight;

    // ── SMART PRE-CHECKS ──
    if (w > MAX_W || h > MAX_H) {
      showWarn(
        `⚠ Image is ${w}×${h} — too large for stable browser upscaling (max ${MAX_W}×${MAX_H}). ` +
        `Please resize it first to avoid crashes.`, true
      );
      // Don't enable the upscale button
    } else {
      if (w >= 800 || h >= 800) {
        showWarn(`ℹ Already ${w}×${h} px — AI upscaling may add limited extra detail. Output will be ${w*4}×${h*4}.`, false);
      }
      btnUpscale.disabled = false;
    }

    // Populate meta row
    metaDims.textContent = `${w} × ${h}`;
    metaOut.textContent  = `${w*4} × ${h*4}`;
    metaSize.textContent = fmtBytes(file.size);
    imgMeta.classList.add('show');

    // Show preview
    previewImg.src = origObjectURL;
    panelTag.textContent = 'ORIGINAL';
    previewSection.classList.add('show');
  };
  img.src = origObjectURL;
}

/* ═══════════════════════════════
   WARNING BANNER
═══════════════════════════════ */
function showWarn(msg, isErr) {
  warnBanner.textContent = msg;
  warnBanner.className   = 'warn-banner show' + (isErr ? ' err' : '');
}
function clearWarn() {
  warnBanner.className   = 'warn-banner';
  warnBanner.textContent = '';
}

/* ═══════════════════════════════
   TABS
═══════════════════════════════ */
function showTab(tab) {
  if (tab === 'before') {
    tabBefore.classList.add('active');
    tabAfter.classList.remove('active');
    previewImg.src       = origObjectURL;
    panelTag.textContent = 'ORIGINAL';
  } else {
    if (!outputBlob) return;
    tabAfter.classList.add('active');
    tabBefore.classList.remove('active');
    previewImg.src       = URL.createObjectURL(outputBlob);
    panelTag.textContent = 'AI 4×';
  }
}

/* ═══════════════════════════════
   STATUS DOT
═══════════════════════════════ */
function setDot(state) {
  statusDot.className = 'status-dot' + (state ? ' ' + state : '');
}

/* ═══════════════════════════════
   PROGRESS
═══════════════════════════════ */
function setProgress(pct, label) {
  progressFill.style.width = Math.round(pct) + '%';
  progressPct.textContent  = Math.round(pct) + '%';
  if (label) progressStatus.textContent = label;
}

/* ═══════════════════════════════
   UPSCALE
═══════════════════════════════ */
async function startUpscale() {
  if (!currentFile) return;

  btnUpscale.disabled  = true;
  btnDownload.disabled = true;
  outputBlob           = null;
  tabAfter.disabled    = true;
  clearWarn();
  progressWrap.classList.add('show');
  setProgress(2, 'Loading AI model…');
  setDot('busy');

  // Pre-load the image element UpscalerJS expects
  const srcImg = new Image();
  srcImg.crossOrigin = 'anonymous';
  await new Promise((res, rej) => { srcImg.onload = res; srcImg.onerror = rej; srcImg.src = origObjectURL; });

  try {
    // Force CPU backend — prevents WebGL GPU out-of-memory crash on Chromebook
    await tf.setBackend('cpu');
    await tf.ready();

    // Lazy-init upscaler once (Real-ESRGAN — more compatible with Chromebook)
    if (!upscalerInst) {
      upscalerInst = new Upscaler({ model: RealESRGAN4x });
    }

    setProgress(5, 'Running Real-ESRGAN 4× (CPU)…');

    // upscale() with patchSize enables the progress callback
    // tf.tidy() auto-disposes all intermediate tensors when inference completes
    const base64 = await upscalerInst.upscale(srcImg, {
      patchSize: 64,
      padding:   4,
      output:    'base64',
      progress:  pct => setProgress(5 + Math.round(pct * 90), `Processing… ${Math.round(pct * 100)}%`),
    });

    setProgress(97, 'Embedding 300 DPI metadata…');
    outputBlob = injectPngDpi(base64, DPI_PPM);

    setProgress(100, 'Complete ✓');
    setDot('done');

    // Unlock output
    tabAfter.disabled = false;
    showTab('after');
    btnDownload.disabled = false;

  } catch (err) {
    console.error('Upscale failed:', err);
    setProgress(0, 'Failed');
    setDot('err');
    showWarn('⚠ Upscale error: ' + (err.message || String(err)).substring(0, 120), true);
  }

  btnUpscale.disabled = false;

  // Explicit tensor cleanup to free RAM
  try { tf.disposeVariables(); } catch (_) {}
}

/* ═══════════════════════════════
   DOWNLOAD
═══════════════════════════════ */
function downloadResult() {
  if (!outputBlob || !currentFile) return;
  const base = currentFile.name.replace(/\.[^.]+$/, '');
  const url  = URL.createObjectURL(outputBlob);
  const a    = Object.assign(document.createElement('a'), {
    href: url, download: base + '_4x_300DPI.png'
  });
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

/* ═══════════════════════════════
   PNG pHYs DPI INJECTION
   Inserts a pHYs chunk (pixels-per-
   metre) before the first IDAT chunk
   so Photoshop/print RIPs read 300 DPI
═══════════════════════════════ */
function crc32(buf, s, l) {
  let c = 0xFFFFFFFF;
  const T = crc32._t || (crc32._t = (() => {
    const t = new Uint32Array(256);
    for (let n = 0; n < 256; n++) {
      let v = n;
      for (let k = 0; k < 8; k++) v = (v & 1) ? (0xEDB88320 ^ (v >>> 1)) : (v >>> 1);
      t[n] = v;
    }
    return t;
  })());
  for (let i = s; i < s + l; i++) c = T[(c ^ buf[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}

function u32be(v) {
  return [(v>>>24)&0xFF, (v>>>16)&0xFF, (v>>>8)&0xFF, v&0xFF];
}

function injectPngDpi(b64, ppm) {
  const raw = atob(b64.split(',')[1]);
  const src = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) src[i] = raw.charCodeAt(i);

  const pB = u32be(ppm);
  const cD = [...pB, ...pB, 0x01];                    // ppuX, ppuY, unit=metre
  const cT = [0x70, 0x48, 0x59, 0x73];               // "pHYs"
  const ci = new Uint8Array([...cT, ...cD]);
  const ck = u32be(crc32(ci, 0, ci.length));
  const ph = new Uint8Array([...u32be(9), ...cT, ...cD, ...ck]);

  let off = -1, i = 8;
  while (i < src.length - 8) {
    const ln = (src[i]<<24|src[i+1]<<16|src[i+2]<<8|src[i+3]) >>> 0;
    const tp = String.fromCharCode(src[i+4], src[i+5], src[i+6], src[i+7]);
    if (tp === 'IDAT') { off = i; break; }
    if (tp === 'pHYs') {
      // Already exists — overwrite in place
      const dv = new DataView(src.buffer);
      dv.setUint32(i+8,  ppm, false);
      dv.setUint32(i+12, ppm, false);
      src[i+16] = 0x01;
      dv.setUint32(i+17, crc32(src, i+4, 13), false);
      return new Blob([src], { type: 'image/png' });
    }
    i += 4 + 4 + ln + 4;
  }
  if (off < 0) return new Blob([src], { type: 'image/png' });

  const out = new Uint8Array(src.length + ph.length);
  out.set(src.subarray(0, off), 0);
  out.set(ph, off);
  out.set(src.subarray(off), off + ph.length);
  return new Blob([out], { type: 'image/png' });
}
</script>
</body>
</html>
